<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      background: #f8fafc;
      position: relative;
    }

    /* Left accent bar */
    .accent-bar {
      position: absolute;
      top: 0; bottom: 0; left: 0;
      width: 6px;
      background: {{brand_color}};
    }

    /* Top accent line */
    .top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: {{brand_color}};
      opacity: 0.25;
    }

    /* Subtle dot grid */
    .bg-dots {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, #cbd5e1 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.45;
    }

    /* Light glow behind title area */
    .bg-glow {
      position: absolute;
      top: 60px; left: 200px;
      width: 600px; height: 350px;
      background: radial-gradient(ellipse at center, {{brand_color}}12 0%, transparent 70%);
      filter: blur(50px);
    }

    .layout {
      position: relative;
      z-index: 1;
      height: 100%;
      padding: 52px 72px 52px 88px; /* extra left for accent bar */
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo-img {
      height: 34px;
      max-width: 160px;
      object-fit: contain;
      object-position: left center;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 700;
      color: {{brand_color}};
    }

    .tag {
      padding: 6px 14px;
      border-radius: 6px;
      background: {{brand_color}}18;
      border: 1px solid {{brand_color}}35;
      font-size: 12px;
      font-weight: 600;
      color: {{brand_color}};
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    /* ── Content ── */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 8px 0;
      gap: 16px;
    }

    .title {
      font-size: {{title_size}}px;
      font-weight: 800;
      line-height: 1.2;
      color: #0f172a;
      letter-spacing: -1.2px;
      max-width: 900px;
      overflow-wrap: break-word;
      word-break: break-word;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .description {
      font-size: 20px;
      line-height: 1.5;
      color: #64748b;
      font-weight: 400;
      max-width: 780px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Footer ── */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .author-block {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: {{brand_color}};
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .author-name {
      font-size: 15px;
      font-weight: 600;
      color: #1e293b;
    }

    .date {
      font-size: 13px;
      color: #94a3b8;
      margin-top: 2px;
    }

    .domain {
      font-size: 14px;
      color: #94a3b8;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="accent-bar"></div>
  <div class="top-bar"></div>
  <div class="bg-dots"></div>
  <div class="bg-glow"></div>

  <div class="layout">
    <div class="header">
      {{logo_html}}
      <span class="tag">{{tag}}</span>
    </div>

    <div class="content">
      <h1 class="title">{{title}}</h1>
      {{description_html}}
    </div>

    <div class="footer">
      <div class="author-block">
        <div class="avatar">{{author_initial}}</div>
        <div>
          <div class="author-name">{{author}}</div>
          <div class="date">{{date}}</div>
        </div>
      </div>
      <span class="domain">{{domain}}</span>
    </div>
  </div>
</body>
</html>
