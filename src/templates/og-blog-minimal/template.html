<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      color: #f8fafc;
      position: relative;
    }

    /* Top accent bar */
    .accent {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 6px;
      background: {{brand_color}};
    }

    /* Subtle grid texture */
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* Glow blob behind the title */
    .glow {
      position: absolute;
      top: 80px; left: -60px;
      width: 600px; height: 400px;
      background: radial-gradient(ellipse at center, {{brand_color}}22 0%, transparent 70%);
      filter: blur(40px);
      pointer-events: none;
    }

    .layout {
      position: relative;
      z-index: 1;
      height: 100%;
      padding: 52px 72px 52px 72px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo-img {
      height: 38px;
      max-width: 180px;
      object-fit: contain;
    }

    .logo-text {
      font-size: 20px;
      font-weight: 700;
      color: {{brand_color}};
      letter-spacing: -0.3px;
    }

    .badge {
      padding: 7px 18px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.05);
      font-size: 13px;
      font-weight: 500;
      color: #94a3b8;
      letter-spacing: 0.2px;
    }

    /* ── Title ── */
    .title-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 16px 0;
    }

    .title {
      font-size: {{title_size}}px;
      font-weight: 800;
      line-height: 1.18;
      color: #f1f5f9;
      letter-spacing: -1.5px;
      max-width: 980px;
      /* clamp long words */
      overflow-wrap: break-word;
      word-break: break-word;
    }

    /* ── Footer ── */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .author-block {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: {{brand_color}};
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .author-name {
      font-size: 17px;
      font-weight: 600;
      color: #f1f5f9;
    }

    .date {
      font-size: 14px;
      color: #64748b;
      margin-top: 3px;
    }

    .domain-tag {
      font-size: 14px;
      color: #475569;
      font-weight: 500;
    }

    /* Bottom accent line */
    .bottom-rule {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, {{brand_color}}, transparent);
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <div class="accent"></div>
  <div class="bg-grid"></div>
  <div class="glow"></div>
  <div class="bottom-rule"></div>

  <div class="layout">
    <div class="header">
      {{logo_html}}
      <span class="badge">Blog Post</span>
    </div>

    <div class="title-wrap">
      <h1 class="title">{{title}}</h1>
    </div>

    <div class="footer">
      <div class="author-block">
        <div class="avatar">{{author_initial}}</div>
        <div>
          <div class="author-name">{{author}}</div>
          <div class="date">{{date}}</div>
        </div>
      </div>
      <span class="domain-tag">{{domain}}</span>
    </div>
  </div>
</body>
</html>
