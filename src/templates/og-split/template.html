<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      display: flex;
    }

    /* ── Left panel (60%) ── */
    .left {
      width: 720px;
      height: 630px;
      background: {{brand_color}};
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 56px 64px;
      flex-shrink: 0;
      overflow: hidden;
    }

    /* Subtle pattern on the left */
    .left-pattern {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 80% 20%, rgba(255,255,255,0.1) 0%, transparent 50%),
        radial-gradient(circle at 10% 90%, rgba(0,0,0,0.15) 0%, transparent 45%);
    }

    .left-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 100%;
    }

    .tag {
      display: inline-flex;
      align-self: flex-start;
      padding: 6px 14px;
      border-radius: 6px;
      background: rgba(255,255,255,0.18);
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.95);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .title {
      font-size: {{title_size}}px;
      font-weight: 800;
      line-height: 1.18;
      color: #ffffff;
      letter-spacing: -1px;
      overflow-wrap: break-word;
      word-break: break-word;
      text-shadow: 0 1px 12px rgba(0,0,0,0.2);
      /* Clamp to available height */
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .left-footer {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      font-weight: 500;
    }

    /* ── Divider ── */
    .divider {
      width: 2px;
      height: 630px;
      background: linear-gradient(
        180deg,
        transparent 0%,
        rgba(0,0,0,0.08) 15%,
        rgba(0,0,0,0.12) 50%,
        rgba(0,0,0,0.08) 85%,
        transparent 100%
      );
      flex-shrink: 0;
    }

    /* ── Right panel (40%) ── */
    .right {
      flex: 1;
      height: 630px;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 52px 56px;
    }

    .right-top {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .logo-img {
      height: 36px;
      max-width: 160px;
      object-fit: contain;
      object-position: left center;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 700;
      color: {{brand_color}};
    }

    .right-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #94a3b8;
      margin-top: 4px;
    }

    /* Accent rule */
    .rule {
      width: 40px;
      height: 3px;
      background: {{brand_color}};
      border-radius: 2px;
      margin: 24px 0;
    }

    .right-middle {
      flex: 1;
      display: flex;
      align-items: center;
    }

    .read-cta {
      font-size: 14px;
      font-weight: 600;
      color: {{brand_color}};
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .read-cta::after {
      content: '→';
      font-size: 16px;
    }

    .right-footer {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .avatar-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: {{brand_color}};
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .author-name {
      font-size: 15px;
      font-weight: 600;
      color: #1e293b;
    }

    .date {
      font-size: 13px;
      color: #94a3b8;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <div class="left">
    <div class="left-pattern"></div>
    <div class="left-content">
      <span class="tag">{{tag}}</span>
      <h1 class="title">{{title}}</h1>
      <span class="left-footer">{{domain}}</span>
    </div>
  </div>

  <div class="divider"></div>

  <div class="right">
    <div class="right-top">
      {{logo_html}}
      <span class="right-label">Article</span>
      <div class="rule"></div>
    </div>

    <div class="right-middle">
      <span class="read-cta">Read article</span>
    </div>

    <div class="right-footer">
      <div class="avatar-row">
        <div class="avatar">{{author_initial}}</div>
        <div>
          <div class="author-name">{{author}}</div>
          <div class="date">{{date}}</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
