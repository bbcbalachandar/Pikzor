<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      position: relative;
      background: #0d0d1a;
    }

    /* Gradient layer */
    .bg-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, {{brand_color}} 0%, #0d0d1a 65%);
      opacity: 0.92;
    }

    /* Radial glow at top-left */
    .bg-glow {
      position: absolute;
      top: -120px; left: -80px;
      width: 700px; height: 600px;
      background: radial-gradient(ellipse at center, {{brand_color}}55 0%, transparent 65%);
      filter: blur(60px);
    }

    /* Noise/grain overlay */
    .bg-noise {
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.35;
    }

    .layout {
      position: relative;
      z-index: 1;
      height: 100%;
      padding: 56px 72px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo-img {
      height: 36px;
      max-width: 160px;
      object-fit: contain;
      filter: brightness(0) invert(1);
    }

    .logo-text {
      font-size: 18px;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
      letter-spacing: -0.2px;
    }

    .tag {
      padding: 6px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.8);
      letter-spacing: 0.3px;
    }

    /* ── Title ── */
    .title-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 12px 0;
    }

    .title {
      font-size: {{title_size}}px;
      font-weight: 800;
      line-height: 1.15;
      color: #ffffff;
      letter-spacing: -1.5px;
      max-width: 960px;
      overflow-wrap: break-word;
      word-break: break-word;
      text-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    /* ── Footer ── */
    .footer {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .author-name {
      font-size: 16px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
    }

    .date {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      margin-top: 2px;
    }

    /* Bottom accent */
    .bottom-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, rgba(255,255,255,0.6), rgba(255,255,255,0.1), transparent);
    }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="bg-glow"></div>
  <div class="bg-noise"></div>
  <div class="bottom-bar"></div>

  <div class="layout">
    <div class="header">
      {{logo_html}}
      <span class="tag">{{tag}}</span>
    </div>

    <div class="title-wrap">
      <h1 class="title">{{title}}</h1>
    </div>

    <div class="footer">
      <div class="avatar">{{author_initial}}</div>
      <div>
        <div class="author-name">{{author}}</div>
        <div class="date">{{date}}</div>
      </div>
    </div>
  </div>
</body>
</html>
