# Pikzor — nginx reverse proxy configuration
# Place at /etc/nginx/sites-available/pikzor and symlink to sites-enabled/
#
# Prerequisites:
#   certbot --nginx -d pikzor.com -d www.pikzor.com

server {
    listen 80;
    server_name pikzor.com www.pikzor.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name pikzor.com www.pikzor.com;

    # ── SSL (managed by Certbot) ───────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/pikzor.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pikzor.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ───────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # ── Static public files (/public directory served directly) ───────────────
    root /var/www/pikzor/public;
    index index.html;

    location ~* \.(html|css|js|ico|svg|woff2?)$ {
        try_files $uri @app;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── Rendered PNG images — aggressive caching ───────────────────────────────
    location /images/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;

        # Cache at nginx level too — images are immutable once generated
        proxy_cache_valid  200 30d;
        expires            30d;
        add_header         Cache-Control "public, max-age=2592000, immutable";
        add_header         X-Served-By nginx;
    }

    # ── OG image generation (/og/*) ────────────────────────────────────────────
    location /og/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;

        # Allow all origins — social crawlers need to fetch these
        add_header Access-Control-Allow-Origin "*" always;
    }

    # ── API (/api/*) ───────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;

        # Stricter rate limiting at nginx level (before hitting Node)
        limit_req zone=api burst=20 nodelay;
    }

    # ── Auth / blog / checker / docs ───────────────────────────────────────────
    location / {
        try_files $uri @app;
    }

    location @app {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/html application/json application/javascript text/css;
    gzip_min_length 1024;
}

# ── Rate limiting zones ────────────────────────────────────────────────────────
# Add this inside the http {} block of /etc/nginx/nginx.conf:
#
# limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
