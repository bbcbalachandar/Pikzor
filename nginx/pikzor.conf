# Pikzor — nginx reverse proxy
# Deploy: sudo cp nginx/pikzor.conf /etc/nginx/sites-available/pikzor
#         sudo ln -s /etc/nginx/sites-available/pikzor /etc/nginx/sites-enabled/
#         sudo rm -f /etc/nginx/sites-enabled/default
#         sudo certbot --nginx -d pikzor.com -d www.pikzor.com
#         sudo nginx -t && sudo systemctl reload nginx

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name pikzor.com www.pikzor.com;
    return 301 https://$host$request_uri;
}

# ── HTTPS ──────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pikzor.com www.pikzor.com;

    # SSL — managed by Certbot (do not edit manually)
    ssl_certificate     /etc/letsencrypt/live/pikzor.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pikzor.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Upload limit (for logo uploads etc.)
    client_max_body_size 10M;

    # Gzip
    gzip on;
    gzip_types text/html text/plain application/json text/css application/javascript;
    gzip_min_length 1024;

    # ── /og/ — OG image generation ──────────────────────────────────────────────
    # Aggressive caching: images are content-addressed and never change
    location /og/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;

        # Immutable — social crawlers can cache forever
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # ── /images/ — cached PNG files served by Node static middleware ─────────────
    location /images/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        add_header         Cache-Control "public, max-age=2592000, immutable" always;
    }

    # ── /api/ — REST API ─────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Everything else (landing page, dashboard, blog, checker, docs, auth) ────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
